  <linearGradient id="shieldInner" x1="0" y1="0" x2="0.2" y2="1">
    <stop offset="0%" stop-color="#1A3D7C" stop-opacity="0.75"/>
    <stop offset="100%" stop-color="#091830" stop-opacity="0.75"/>
  </linearGradient>
  <linearGradient id="bar1" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#1E4A8A"/><stop offset="100%" stop-color="#4A8ED4"/></linearGradient>
  <linearGradient id="bar2" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#1A3D7C"/><stop offset="100%" stop-color="#3A78C8"/></linearGradient>
  <linearGradient id="bar3" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#152E60"/><stop offset="100%" stop-color="#2E62B0"/></linearGradient>
  <linearGradient id="bar4" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#0E1E44"/><stop offset="100%" stop-color="#2050A0"/></linearGradient>
