<svg width="580" height="580" viewBox="0 0 580 580" xmlns="http://www.w3.org/2000/svg">
<defs>
  <radialGradient id="bgCircle" cx="40%" cy="40%" r="65%">
    <stop offset="0%" stop-color="#0F2744"/>
    <stop offset="100%" stop-color="#071A10"/>
  </radialGradient>
  <linearGradient id="shieldOuter" x1="0" y1="0" x2="0.3" y2="1">
