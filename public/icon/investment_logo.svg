  <linearGradient id="tagSafe"  x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#14532D"/><stop offset="100%" stop-color="#16A34A"/></linearGradient>
  <linearGradient id="tagWarn"  x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#78350F"/><stop offset="100%" stop-color="#D97706"/></linearGradient>
  <linearGradient id="tagLimit" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#7F1D1D"/><stop offset="100%" stop-color="#DC2626"/></linearGradient>
  <linearGradient id="tagDelist" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#450A0A"/><stop offset="100%" stop-color="#991B1B"/></linearGradient>
